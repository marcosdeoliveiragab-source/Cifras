<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cifras</title>
    <!-- Versao com ajuste automatico dos hifens nas linhas de acordes. -->
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        header { background-color: #536dfe; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        header button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 0 10px; }

        .tela { padding: 20px; flex: 1; overflow-y: auto; background-color: #fff; }
        .btn-principal { background-color: #536dfe; color: white; border: none; padding: 15px; width: 100%; font-size: 16px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .btn-voltar { background-color: #eee; border: 1px solid #ccc; padding: 8px 15px; font-size: 14px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }

        .container-central { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 15px; max-width: 320px; margin: 0 auto; }
        .container-formulario { display: flex; flex-direction: column; max-width: 320px; margin: 0 auto; gap: 15px; }
        .campo-grupo { display: flex; flex-direction: column; gap: 5px; }
        .campo-grupo label { font-weight: bold; font-size: 14px; }
        .campo-grupo input, .campo-grupo select { padding: 10px; border: 2px solid #dcdcdc; border-radius: 8px; font-size: 16px; outline: none; background-color: #fff; }

        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 15px 10px; border-bottom: 1px solid #ddd; cursor: pointer; }
        .item-lista-esquerda { display: flex; align-items: center; }
        .icone-opcoes { color: #888; font-weight: bold; padding: 5px 15px; font-size: 20px; }

        #editor-visual, #visualizador-cifra {
            width: 100%; min-height: 70vh; border: none;
            font-family: monospace; font-size: 16px; padding: 10px 0 60px 0;
            white-space: pre-wrap; outline: none; background: #fff;
            box-sizing: border-box;
        }

        #editor-visual { border: 1px solid #ddd; padding: 10px; }
        .acorde { color: #536dfe; font-weight: bold; }

        .modal-fundo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-caixa { background-color: #fff; padding: 20px; border-radius: 10px; width: 280px; display: flex; flex-direction: column; gap: 10px; }
        .btn-acao { background-color: #536dfe; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-excluir { background-color: #ff4d4d; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-cancelar { background-color: #eee; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 16px; color: #333; }

        .grade-tons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .btn-toolbar { width: 35px; height: 35px; border: 1px solid #ccc; border-radius: 5px; background: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .btn-toolbar:hover { background: #eee; }
    </style>
</head>
<body>
    <input type="file" id="input-importar" accept=".json" style="display: none;" onchange="processarImportacao(event)">

    <!-- TELA DE LOGIN BLOQUEANTE -->
    <div id="tela-login" style="display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f5f5f5; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;">
        <div class="container-formulario" style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 320px; box-sizing: border-box; text-align: center;">
            <h2 style="color: #536dfe; margin-top: 0; margin-bottom: 20px;">Acesso ao Cifras</h2>
            <div class="campo-grupo" style="text-align: left;">
                <label for="input-senha">Senha de Acesso</label>
                <input type="password" id="input-senha" placeholder="Digite a senha..." style="width: 100%; box-sizing: border-box;">
            </div>
            <button class="btn-acao" onclick="verificarSenha()" style="margin-top: 20px; width: 100%;">Entrar</button>
        </div>
    </div>

    <header>
        <div><button id="btn-menu" onclick="abrirMenuPrincipal()">☰</button> Cifras</div>
        <div id="header-acoes-padrao" style="display: flex; gap: 5px; align-items: center;">
            <button id="btn-adicionar" onclick="trocarTela('selecao-criacao-pasta')">+</button>
            <button onclick="trocarTela('pesquisa')">🔍</button>
        </div>
        <div id="header-acoes-editor" style="display: none; gap: 5px; align-items: center;">
            <button onclick="abrirModalTom()" style="font-weight: bold;" title="Mudar tom">🎵</button>
            <button onclick="alterarFonte(-2)" style="font-weight: bold;">A-</button>
            <button onclick="alterarFonte(2)" style="font-weight: bold;">A+</button>
            <button onclick="salvarCifra()" style="margin-left: 10px;" id="btn-salvar-cifra">💾</button>
        </div>
    </header>

    <div id="tela-inicial" class="tela">
        <div id="lista-pastas-container"></div>
    </div>

    <div id="selecao-criacao-pasta" class="tela" style="display: none;">
        <button class="btn-voltar" onclick="trocarTela('tela-inicial')">← Voltar</button>
        <div class="container-central">
            <button class="btn-principal" onclick="prepararCriacao('nova')">Criar nova pasta</button>
            <button class="btn-principal" style="background-color: #eee; color: #333; border: 2px solid #ddd;" onclick="prepararCriacao('existente')">Selecionar pasta existente</button>
        </div>
    </div>

    <div id="tela-criar-pasta" class="tela" style="display: none;">
        <button class="btn-voltar" onclick="trocarTela('selecao-criacao-pasta')">← Voltar</button>
        <div class="container-formulario">
            <div id="div-nome-pasta" class="campo-grupo">
                <label>Nome da nova pasta</label>
                <input type="text" id="input-nome-pasta" placeholder="Ex: Harpa Cristã">
            </div>
            <div id="div-select-pasta" class="campo-grupo" style="display:none;">
                <label>Escolher pasta</label>
                <select id="select-pasta-existente"></select>
            </div>
            <div class="campo-grupo">
                <label>Nome da música</label>
                <input type="text" id="input-nome-musica" placeholder="Ex: Alvo mais que a neve">
            </div>
            <button class="btn-acao" onclick="iniciarEditor()" style="margin-top: 10px;">Criar cifra</button>
        </div>
    </div>

    <div id="tela-musicas-pasta" class="tela" style="display: none;">
        <button class="btn-voltar" onclick="trocarTela('tela-inicial')">← Voltar</button>
        <h2 id="titulo-pasta-atual" style="margin-top: 0;"></h2>
        <div id="lista-musicas-container"></div>
    </div>

    <div id="tela-editor-cifra" class="tela" style="display: none;">
        <button class="btn-voltar" onclick="voltarDoEditor()">← Voltar</button>

        <div id="toolbar-editor" style="display: none; gap: 8px; margin-bottom: 10px; background: #e0e0e0; padding: 10px; border-radius: 8px; align-items: center; flex-wrap: wrap;">
            <button class="btn-toolbar" onmousedown="event.preventDefault();" onclick="document.execCommand('bold', false, null)" style="font-weight: bold;" title="Negrito">B</button>
            <button class="btn-toolbar" onmousedown="event.preventDefault();" onclick="document.execCommand('italic', false, null)" style="font-style: italic;" title="Itálico">I</button>
            <span style="margin: 0 5px; color: #aaa;">|</span>
            <button class="btn-toolbar" onmousedown="event.preventDefault();" onclick="document.execCommand('foreColor', false, 'black')" style="color: black; font-weight: bold;" title="Preto">A</button>
            <button class="btn-toolbar" onmousedown="event.preventDefault();" onclick="document.execCommand('foreColor', false, 'red')" style="color: red; font-weight: bold;" title="Vermelho">A</button>
            <button class="btn-toolbar" onmousedown="event.preventDefault();" onclick="document.execCommand('foreColor', false, 'darkgreen')" style="color: darkgreen; font-weight: bold;" title="Verde Escuro">A</button>
            <button class="btn-toolbar" onmousedown="event.preventDefault();" onclick="document.execCommand('foreColor', false, '#4B0082')" style="color: #4B0082; font-weight: bold;" title="Roxo Escuro">A</button>
            <span style="font-size: 12px; color: #555; margin-left: 10px;">Selecione para formatar</span>
        </div>

        <div id="editor-visual" contenteditable="true" spellcheck="false" style="display: none;"></div>
        <div id="visualizador-cifra" ondblclick="editarCifra()" title="Dê 2 cliques para editar"></div>
    </div>

    <div id="pesquisa" class="tela" style="display: none;">
        <button class="btn-voltar" onclick="trocarTela('tela-inicial')">← Voltar</button>
        <input type="text" id="input-pesquisa" onkeyup="realizarPesquisa()" placeholder="Buscar música ou pasta..." style="width: 100%; padding: 15px; margin-bottom: 20px; box-sizing: border-box; border-radius: 8px; border: 2px solid #ccc; font-size: 16px;">
        <div id="resultado-pesquisa"></div>
    </div>

    <div id="modal-opcoes" class="modal-fundo">
        <div class="modal-caixa">
            <h3 id="titulo-modal" style="margin: 0 0 10px 0; text-align: center;">Opções</h3>
            <button class="btn-acao" onclick="baixarArquivo()">Exportar (Baixar)</button>
            <button class="btn-acao" onclick="renomearItem()" id="btn-renomear">Renomear</button>
            <button class="btn-acao" id="btn-mover" onclick="abrirModalTransferencia('mover')">Mover para outra pasta</button>
            <button class="btn-acao" id="btn-copiar" onclick="abrirModalTransferencia('copiar')">Copiar para outra pasta</button>
            <button class="btn-excluir" id="btn-excluir" onclick="excluirItem()">Excluir</button>
            <button class="btn-cancelar" onclick="fecharModal('modal-opcoes')">Cancelar</button>
        </div>
    </div>

    <div id="modal-transferir" class="modal-fundo">
        <div class="modal-caixa">
            <h3 id="titulo-modal-transferencia" style="margin: 0; text-align: center;">Transferir</h3>
            <div class="campo-grupo">
                <label>Selecione a pasta destino:</label>
                <select id="select-pasta-destino"></select>
            </div>
            <button class="btn-acao" id="btn-confirmar-transferencia" onclick="confirmarTransferencia()">Confirmar</button>
            <button class="btn-cancelar" onclick="fecharModal('modal-transferir')">Cancelar</button>
        </div>
    </div>

    <div id="modal-menu-principal" class="modal-fundo">
        <div class="modal-caixa">
            <h3 style="margin: 0; text-align: center;">Menu Principal</h3>
            <button class="btn-acao" onclick="iniciarImportacao()">📥 Importar Arquivo (.json)</button>
            <button class="btn-cancelar" onclick="fecharModal('modal-menu-principal')">Fechar</button>
        </div>
    </div>

    <div id="modal-tom" class="modal-fundo">
        <div class="modal-caixa">
            <h3 style="margin: 0; text-align: center;">Mudar Tom</h3>
            <div class="grade-tons">
                <button class="btn-acao" onclick="aplicarTransposicao('C')">C</button>
                <button class="btn-acao" onclick="aplicarTransposicao('C#')">C#</button>
                <button class="btn-acao" onclick="aplicarTransposicao('D')">D</button>
                <button class="btn-acao" onclick="aplicarTransposicao('D#')">D#</button>
                <button class="btn-acao" onclick="aplicarTransposicao('E')">E</button>
                <button class="btn-acao" onclick="aplicarTransposicao('F')">F</button>
                <button class="btn-acao" onclick="aplicarTransposicao('F#')">F#</button>
                <button class="btn-acao" onclick="aplicarTransposicao('G')">G</button>
                <button class="btn-acao" onclick="aplicarTransposicao('G#')">G#</button>
                <button class="btn-acao" onclick="aplicarTransposicao('A')">A</button>
                <button class="btn-acao" onclick="aplicarTransposicao('A#')">A#</button>
                <button class="btn-acao" onclick="aplicarTransposicao('B')">B</button>
            </div>
            <button class="btn-cancelar" onclick="fecharModal('modal-tom')">Cancelar</button>
        </div>
    </div>

    <script>
    let bancoDeDados = JSON.parse(localStorage.getItem('appCifras')) || {};
    if (!Array.isArray(bancoDeDados["Importados"])) bancoDeDados["Importados"] = [];

    let usuarioRole = null; // Controle global de nível ('admin' ou 'musico')
    let contextoEdicao = { pasta: "", musicaTitulo: "", indexEdicao: -1 };
    let contextoExportacao = { tipo: "", pasta: "", indexMusica: -1 };
    let modoTransferencia = 'mover';
    let tamanhoFonte = 16;
    let tomOriginal = null;

    const notasEscala = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const regexAcordeExato = /^([A-G][b#]?m?(?:2|4|5|6|7|9|11|13|maj7|maj9|7M|9M|sus|sus2|sus4|dim|dim7|aug|add9|m7b5)?(\/[A-G][b#]?)?)$/i;
    const regexTags = /^(tom|intro|capo|ponte|refrão|refrao|coro|solo|final|parte|primeira|segunda|terceira|\d+)\s*:?\s*/i;
    const tagsBloco = new Set(['address', 'article', 'aside', 'blockquote', 'div', 'dl', 'dt', 'dd', 'fieldset', 'figcaption', 'figure', 'footer', 'form', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'header', 'hr', 'li', 'main', 'nav', 'ol', 'p', 'pre', 'section', 'table', 'ul']);

    // SISTEMA DE VERIFICAÇÃO DE SENHAS
    function verificarSenha() {
        let senha = document.getElementById('input-senha').value;
        if (senha === '10022006') {
            usuarioRole = 'admin';
            localStorage.setItem('cifrasAuth', 'admin');
            document.getElementById('tela-login').style.display = 'none';
            aplicarPermissoesDOM();
            trocarTela('tela-inicial');
        } else if (senha === 'musicos@') {
            usuarioRole = 'musico';
            localStorage.setItem('cifrasAuth', 'musico');
            document.getElementById('tela-login').style.display = 'none';
            aplicarPermissoesDOM();
            trocarTela('tela-inicial');
        } else {
            alert("Senha incorreta!");
        }
    }

    function aplicarPermissoesDOM() {
        let btnAdicionar = document.getElementById('btn-adicionar');
        let btnMenu = document.getElementById('btn-menu');
        
        if (usuarioRole === 'musico') {
            if (btnAdicionar) btnAdicionar.style.display = 'none';
            if (btnMenu) btnMenu.style.display = 'none';
        } else {
            if (btnAdicionar) btnAdicionar.style.display = 'block';
            if (btnMenu) btnMenu.style.display = 'block';
        }
    }

    function inicializarAutenticacao() {
        let authSalva = localStorage.getItem('cifrasAuth');
        if (authSalva === 'admin' || authSalva === 'musico') {
            usuarioRole = authSalva;
            document.getElementById('tela-login').style.display = 'none';
            aplicarPermissoesDOM();
            trocarTela('tela-inicial');
        } else {
            document.getElementById('tela-login').style.display = 'flex';
        }
    }

    function sortAlfanumerico(a, b) {
        return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
    }

    function escaparHTML(texto) {
        return texto
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function escaparAtributo(texto) {
        return String(texto)
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function serializarAtributos(el) {
        return Array.from(el.attributes)
            .map(attr => ` ${attr.name}="${escaparAtributo(attr.value)}"`)
            .join('');
    }

    function envolverComFormatacao(html, formatacoes) {
        return formatacoes.reduceRight((conteudo, item) => `<${item.tag}${item.attrs}>${conteudo}</${item.tag}>`, html);
    }

    function adicionarTextoComoTokens(tokens, texto, formatacoes) {
        let limpo = texto.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\r\n?/g, '\n');
        let partes = limpo.split('\n');

        partes.forEach((parte, index) => {
            if (index > 0) tokens.push({ tipo: 'quebra', origem: 'texto' });
            if (parte !== '') {
                tokens.push({ tipo: 'texto', html: envolverComFormatacao(escaparHTML(parte), formatacoes) });
            }
        });
    }

    function adicionarQuebra(tokens, origem) {
        tokens.push({ tipo: 'quebra', origem });
    }

    function processarNoParaTokens(no, tokens, formatacoes) {
        if (no.nodeType === Node.TEXT_NODE) {
            adicionarTextoComoTokens(tokens, no.nodeValue || '', formatacoes);
            return;
        }

        if (no.nodeType !== Node.ELEMENT_NODE) return;

        let tag = no.tagName.toLowerCase();
        if (tag === 'br') {
            adicionarQuebra(tokens, 'br');
            return;
        }

        if (tag === 'b' && no.classList.contains('acorde')) {
            no.childNodes.forEach(filho => processarNoParaTokens(filho, tokens, formatacoes));
            return;
        }

        if (tagsBloco.has(tag)) {
            if (tokens.length > 0 && tokens[tokens.length - 1].tipo !== 'quebra') {
                adicionarQuebra(tokens, 'bloco');
            }

            let inicio = tokens.length;
            no.childNodes.forEach(filho => processarNoParaTokens(filho, tokens, formatacoes));

            if (tokens.length === inicio) {
                adicionarQuebra(tokens, 'br');
            } else if (tokens[tokens.length - 1].tipo !== 'quebra') {
                adicionarQuebra(tokens, 'bloco');
            }
            return;
        }

        let novaFormatacao = formatacoes.concat([{ tag, attrs: serializarAtributos(no) }]);
        no.childNodes.forEach(filho => processarNoParaTokens(filho, tokens, novaFormatacao));
    }

    function normalizarHTMLParaLinhas(html) {
        let container = document.createElement('div');
        container.innerHTML = html || '';

        let tokens = [];
        container.childNodes.forEach(no => processarNoParaTokens(no, tokens, []));

        while (tokens.length > 0 && tokens[tokens.length - 1].tipo === 'quebra' && tokens[tokens.length - 1].origem === 'bloco') {
            tokens.pop();
        }

        if (tokens.length === 0) return [''];

        let lines = [''];
        tokens.forEach(token => {
            if (token.tipo === 'quebra') {
                lines.push('');
            } else {
                lines[lines.length - 1] += token.html;
            }
        });

        return lines;
    }

    function prepararHTMLParaEdicao(html) {
        return normalizarHTMLParaLinhas(html).join('<br>');
    }

    function textoPuroDaLinha(linha) {
        let temp = document.createElement('div');
        temp.innerHTML = linha;
        return (temp.textContent || '').replace(/\u00a0/g, ' ');
    }

    function normalizarEspacamentoHifensEmTexto(texto) {
        let textoLimpo = texto.replace(/\u00a0/g, ' ');
        let inicio = (textoLimpo.match(/^\s*/) || [''])[0];
        let corpo = textoLimpo.slice(inicio.length).trim();

        if (!corpo.includes('-')) return textoLimpo;

        corpo = corpo
            .replace(/\s*-\s*/g, ' - ')
            .replace(/[ \t\f\v]+/g, ' ')
            .trim();

        return inicio + corpo;
    }

    function trocarTagsPorMarcadores(html) {
        let tags = [];
        let texto = html.replace(/<[^>]+>/g, tag => {
            let marcador = `\uE000${tags.length}\uE001`;
            tags.push(tag);
            return marcador;
        });

        return { texto, tags };
    }

    function restaurarTagsDosMarcadores(texto, tags) {
        return texto.replace(/\uE000(\d+)\uE001/g, (match, index) => tags[Number(index)] || match);
    }

    function normalizarEspacamentoHifensEmHTML(html) {
        let partes = trocarTagsPorMarcadores(html);
        let textoNormalizado = normalizarEspacamentoHifensEmTexto(partes.texto);
        return restaurarTagsDosMarcadores(textoNormalizado, partes.tags);
    }

    function analisarLinhaDeCifra(linha) {
        let texto = textoPuroDaLinha(linha);
        let temHifen = texto.includes('-');
        let textoParaValidar = temHifen ? normalizarEspacamentoHifensEmTexto(texto) : texto;
        let palavras = textoParaValidar.trim().split(/\s+/).filter(p => p !== '');

        return {
            texto,
            textoNormalizado: textoParaValidar,
            palavras,
            temHifen,
            ehCifra: palavras.length > 0 && palavras.every(validarPalavraCifra)
        };
    }

    function validarPalavraCifra(p) {
        let texto = p.replace(/^[\[\(]+|[\]\)]+$/g, '').trim();
        if (texto === '') return false;
        if (/^[-|:,/]+$/.test(texto)) return true;
        let semTag = texto.replace(regexTags, '');
        if (semTag === '') return true;
        return regexAcordeExato.test(semTag);
    }

    function extrairAcordeDaPalavra(p) {
        let limpa = p.replace(/^[\[\(]+|[\]\)]+$/g, '');
        let tagMatch = limpa.match(regexTags);
        if (tagMatch) limpa = limpa.substring(tagMatch[0].length);
        if (limpa && regexAcordeExato.test(limpa)) return limpa;
        return null;
    }

    function salvarNoNavegador() {
        for (let pasta in bancoDeDados) {
            bancoDeDados[pasta].sort((a, b) => sortAlfanumerico(a.titulo, b.titulo));
        }
        localStorage.setItem('appCifras', JSON.stringify(bancoDeDados));
    }

    function atualizarIndiceEdicao() {
        let musicas = bancoDeDados[contextoEdicao.pasta];
        if (!musicas) return;
        contextoEdicao.indexEdicao = musicas.findIndex(m => m.titulo === contextoEdicao.musicaTitulo);
    }

    function alterarFonte(delta) {
        tamanhoFonte += delta;
        if (tamanhoFonte < 10) tamanhoFonte = 10;
        if (tamanhoFonte > 40) tamanhoFonte = 40;
        document.getElementById('editor-visual').style.fontSize = tamanhoFonte + "px";
        document.getElementById('visualizador-cifra').style.fontSize = tamanhoFonte + "px";
    }

    function formatarLinhaDeAcordes(linha) {
        return linha.replace(/(>|^)([^<]+)(<|$)/g, function(match, prefix, conteudo, suffix) {
            let pedacos = conteudo.split(/(\s+|&nbsp;)/).map(pedaco => {
                let textoPedaco = pedaco.replace(/&nbsp;/g, ' ').replace(/\u00a0/g, ' ');
                let acorde = extrairAcordeDaPalavra(textoPedaco);
                if (acorde) {
                    let idx = pedaco.lastIndexOf(acorde);
                    if (idx !== -1) {
                        let acordeSeguro = escaparAtributo(acorde);
                        return pedaco.substring(0, idx) + `<b class="acorde" data-nota="${acordeSeguro}">${escaparHTML(acorde)}</b>` + pedaco.substring(idx + acorde.length);
                    }
                }
                return pedaco;
            });
            return prefix + pedacos.join('') + suffix;
        });
    }

    function formatarCifraVisual(html) {
        let linhas = normalizarHTMLParaLinhas(html);

        return linhas.map(linha => {
            let infoLinha = analisarLinhaDeCifra(linha);
            if (infoLinha.palavras.length === 0) return linha;
            if (infoLinha.ehCifra && infoLinha.temHifen) {
                return formatarLinhaDeAcordes(normalizarEspacamentoHifensEmHTML(linha));
            }
            if (infoLinha.ehCifra) return formatarLinhaDeAcordes(linha);
            return linha;
        }).join('<br>');
    }

    function normalizarNota(nota) {
        const equivalentes = { 'DB': 'C#', 'EB': 'D#', 'GB': 'F#', 'AB': 'G#', 'BB': 'A#' };
        let notaUpper = nota.toUpperCase();
        return equivalentes[notaUpper] || notaUpper;
    }

    function descobrirTomDaMusica(html) {
        let linhas = normalizarHTMLParaLinhas(html);
        for (let linha of linhas) {
            let infoLinha = analisarLinhaDeCifra(linha);
            let matchTom = infoLinha.textoNormalizado.trim().match(/^tom:\s*([A-G][b#]?)/i);
            if (matchTom) return normalizarNota(matchTom[1]);

            if (infoLinha.ehCifra) {
                for (let p of infoLinha.palavras) {
                    let acorde = extrairAcordeDaPalavra(p);
                    if (acorde) {
                        let matchAcorde = acorde.match(/^([A-G][b#]?)/i);
                        if (matchAcorde) return normalizarNota(matchAcorde[1]);
                    }
                }
            }
        }
        return null;
    }

    function transporAcorde(acorde, diferenca) {
        let partes = acorde.split('/');
        for (let i = 0; i < partes.length; i++) {
            let raizMatch = partes[i].match(/^([A-G][b#]?)/i);
            if (raizMatch) {
                let raiz = normalizarNota(raizMatch[1]);
                let resto = partes[i].substring(raizMatch[1].length);
                let index = notasEscala.indexOf(raiz);
                if (index !== -1) {
                    let novoIndex = (index + diferenca + 120) % 12;
                    partes[i] = notasEscala[novoIndex] + resto;
                }
            }
        }
        return partes.join('/');
    }

    function transporTextoDeAcordesComHifen(texto, diferenca) {
        let textoNormalizado = normalizarEspacamentoHifensEmTexto(texto);

        return textoNormalizado.replace(/\S+/g, token => {
            let acorde = extrairAcordeDaPalavra(token);
            if (!acorde) return token;

            let acordeTransposto = transporAcorde(acorde, diferenca);
            let idx = token.lastIndexOf(acorde);
            if (idx === -1) return token;

            return token.substring(0, idx) + acordeTransposto + token.substring(idx + acorde.length);
        });
    }

    function transporLinhaDeAcordes(linha, diferenca, infoLinha) {
        let info = infoLinha || analisarLinhaDeCifra(linha);

        if (info.temHifen) {
            return escaparHTML(transporTextoDeAcordesComHifen(info.texto, diferenca));
        }

        return linha.replace(/(>|^)([^<]+)(<|$)/g, function(match, prefix, conteudo, suffix) {
            let difLenPendente = 0;
            let pedacos = conteudo.split(/(&nbsp;|\s)/);

            for (let k = 0; k < pedacos.length; k++) {
                if (pedacos[k] === '&nbsp;' || /^\s$/.test(pedacos[k])) {
                    if (difLenPendente > 0) {
                        pedacos[k] = '';
                        difLenPendente--;
                    } else if (difLenPendente < 0) {
                        pedacos[k] += '&nbsp;';
                        difLenPendente++;
                    }
                } else if (pedacos[k].length > 0) {
                    let textPedaco = pedacos[k].replace(/&nbsp;/g, ' ').replace(/\u00a0/g, ' ');
                    let acorde = extrairAcordeDaPalavra(textPedaco);
                    if (acorde) {
                        let acordeTransposto = transporAcorde(acorde, diferenca);
                        difLenPendente += (acordeTransposto.length - acorde.length);
                        let idx = pedacos[k].lastIndexOf(acorde);
                        if (idx !== -1) {
                            pedacos[k] = pedacos[k].substring(0, idx) + acordeTransposto + pedacos[k].substring(idx + acorde.length);
                        }
                    }
                }
            }

            return prefix + pedacos.join('') + suffix;
        });
    }

    function aplicarTransposicao(notaDestino) {
        let editor = document.getElementById('editor-visual');
        let html = editor.innerHTML;

        if (!tomOriginal) tomOriginal = descobrirTomDaMusica(html);
        if (!tomOriginal) return alert("Não foi possível identificar acordes na música para transpor.");

        let idxOrig = notasEscala.indexOf(tomOriginal);
        let idxDest = notasEscala.indexOf(notaDestino);
        let diferenca = idxDest - idxOrig;

        if (diferenca !== 0) {
            let linhas = normalizarHTMLParaLinhas(html);
            let novoTexto = linhas.map(linha => {
                let infoLinha = analisarLinhaDeCifra(linha);
                if (infoLinha.ehCifra) {
                    return transporLinhaDeAcordes(linha, diferenca, infoLinha);
                }
                return linha;
            }).join('<br>');

            let htmlFinal = formatarCifraVisual(novoTexto);
            let pasta = contextoEdicao.pasta;
            atualizarIndiceEdicao();

            if (contextoEdicao.indexEdicao !== -1) {
                bancoDeDados[pasta][contextoEdicao.indexEdicao].letra = htmlFinal;
                salvarNoNavegador();
                atualizarIndiceEdicao();
            }

            editor.innerHTML = prepararHTMLParaEdicao(htmlFinal);
            document.getElementById('visualizador-cifra').innerHTML = htmlFinal;
            tomOriginal = notaDestino;
        }
        fecharModal('modal-tom');
    }

        let editor = document.getElementById('editor-visual');

        } else {
            atualizarIndiceEdicao();
            bancoDeDados[pasta][contextoEdicao.indexEdicao] = novaMusica;

        atualizarIndiceEdicao();

            iconeOpcoes.className = 'icone-opcoes';

        editor.innerHTML = prepararHTMLParaEdicao(htmlFormatado);
        editor.style.fontSize = tamanhoFonte + "px";

    function realizarPesquisa() {
        let termo = document.getElementById('input-pesquisa').value.toLowerCase().trim();
        let container = document.getElementById('resultado-pesquisa');
        container.innerHTML = "";
        if (!termo) return;

        let resEncontrados = 0;
        for (let pasta in bancoDeDados) {
            if (pasta.toLowerCase().includes(termo)) {
                resEncontrados++;
                let div = document.createElement('div');
                div.className = 'item-lista';
                div.onclick = () => abrirPasta(pasta);
                div.innerHTML = `<div class="item-lista-esquerda"><span style="margin-right: 15px;">📁</span> <span>${escaparHTML(pasta)}</span> <span style="font-size: 11px; background-color: #eee; padding: 3px 8px; border-radius: 10px; color: #666; margin-left: 10px;">Pasta</span></div>`;
                container.appendChild(div);
            }

            bancoDeDados[pasta].forEach((musica, index) => {
                if (musica.titulo.toLowerCase().includes(termo)) {
                    resEncontrados++;
                    let div = document.createElement('div');
                    div.className = 'item-lista';
                    div.onclick = () => abrirMusica(pasta, index);
                    div.innerHTML = `<div class="item-lista-esquerda"><span style="margin-right: 15px;">🎵</span> <div><div>${escaparHTML(musica.titulo)}</div><div style="font-size: 12px; color: #888;">Na pasta: ${escaparHTML(pasta)}</div></div></div>`;
                    container.appendChild(div);
                }
            });
        }

        if (resEncontrados === 0) container.innerHTML = "<p style='text-align: center; color:#888;'>Nenhum resultado.</p>";
    }

    function excluirItem() {
        if (usuarioRole !== 'admin') return;
        fecharModal('modal-opcoes');
        if (contextoExportacao.tipo === 'pasta') {
            if (confirm(`Excluir a pasta "${contextoExportacao.pasta}"?`)) {
                delete bancoDeDados[contextoExportacao.pasta];
                salvarNoNavegador();
                renderizarPastas();
            }
        } else {
            if (confirm("Excluir a música?")) {
                bancoDeDados[contextoExportacao.pasta].splice(contextoExportacao.indexMusica, 1);
                salvarNoNavegador();
                abrirPasta(contextoExportacao.pasta);
            }
        }
    }

    function renomearItem() {
        if (usuarioRole !== 'admin') return;
        fecharModal('modal-opcoes');
        if (contextoExportacao.tipo === 'pasta') {
            let novoNome = prompt("Novo nome:", contextoExportacao.pasta);
            if (!novoNome || novoNome.trim() === "" || novoNome === contextoExportacao.pasta) return;
            novoNome = novoNome.trim();
            if (novoNome.toLowerCase() === "importados") return alert("Nome reservado.");
            if (Object.keys(bancoDeDados).some(p => p.toLowerCase() === novoNome.toLowerCase())) return alert("Já existe!");

            bancoDeDados[novoNome] = bancoDeDados[contextoExportacao.pasta];
            delete bancoDeDados[contextoExportacao.pasta];
            salvarNoNavegador();
            renderizarPastas();
        } else {
            let musica = bancoDeDados[contextoExportacao.pasta][contextoExportacao.indexMusica];
            let novoNome = prompt("Novo nome:", musica.titulo);
            if (!novoNome || novoNome.trim() === "" || novoNome === musica.titulo) return;
            novoNome = novoNome.trim();
            if (bancoDeDados[contextoExportacao.pasta].some((m, i) => m.titulo.toLowerCase() === novoNome.toLowerCase() && i !== contextoExportacao.indexMusica)) return alert("Já existe!");

            musica.titulo = novoNome;
            salvarNoNavegador();
            abrirPasta(contextoExportacao.pasta);
        }
    }

    function confirmarTransferencia() {
        if (usuarioRole !== 'admin') return;
        let pastaDestino = document.getElementById('select-pasta-destino').value;
        let musicaOrigem = bancoDeDados[contextoExportacao.pasta][contextoExportacao.indexMusica];
        if (bancoDeDados[pastaDestino].some(m => m.titulo.toLowerCase() === musicaOrigem.titulo.toLowerCase())) return alert("Já existe!");

        bancoDeDados[pastaDestino].push(musicaCopia);

    function baixarArquivo() {
        let dadosParaBaixar = {};
        let nomeDoArquivo = "";

        if (contextoExportacao.tipo === 'pasta') {
            dadosParaBaixar = { formatoCifrasApp: "pasta", nomePasta: contextoExportacao.pasta, musicas: bancoDeDados[contextoExportacao.pasta] };
            nomeDoArquivo = contextoExportacao.pasta + "_Backup_Cifras.json";
        } else {
            let musica = bancoDeDados[contextoExportacao.pasta][contextoExportacao.indexMusica];
            dadosParaBaixar = { formatoCifrasApp: "musicaUnica", musica: musica };
            nomeDoArquivo = musica.titulo + "_Cifra.json";
        }

        let blob = new Blob([JSON.stringify(dadosParaBaixar, null, 2)], { type: "application/json" });
        let url = URL.createObjectURL(blob);
        let tagA = document.createElement("a");
        tagA.href = url;
        tagA.download = nomeDoArquivo;
        tagA.click();
        URL.revokeObjectURL(url);
        fecharModal('modal-opcoes');
    }

    function iniciarImportacao() {
        if (usuarioRole !== 'admin') return;
        fecharModal('modal-menu-principal');
        document.getElementById('input-importar').click();
    }

    function processarImportacao(event) {
        if (usuarioRole !== 'admin') return;
        let arquivo = event.target.files[0];
        if (!arquivo) return;

        let leitor = new FileReader();
        leitor.onload = function(e) {
            try {
                let importado = JSON.parse(e.target.result);

                if (importado.formatoCifrasApp === "musicaUnica") {
                    let tituloImportado = importado.musica.titulo;
                    let contador = 1;
                    while (bancoDeDados["Importados"].some(m => m.titulo === tituloImportado)) {
                        tituloImportado = importado.musica.titulo + ` (${contador})`;
                        contador++;
                    }
                    importado.musica.titulo = tituloImportado;
                    bancoDeDados["Importados"].push(importado.musica);
                } else if (importado.formatoCifrasApp === "pasta") {
                    let nomePasta = importado.nomePasta === "Importados" ? "Importados (Backup)" : importado.nomePasta;
                    if (!bancoDeDados[nomePasta]) bancoDeDados[nomePasta] = [];
                    for (let mus of importado.musicas) {
                        if (!bancoDeDados[nomePasta].some(m => m.titulo === mus.titulo)) bancoDeDados[nomePasta].push(mus);
                    }
                } else {
                    return alert("Formato antigo/incompatível.");
                }

                salvarNoNavegador();
                renderizarPastas();
                alert("Sucesso!");
            } catch (erro) {
                alert("Arquivo inválido.");
            }
        };

        leitor.readAsText(arquivo);
        event.target.value = '';
    }

    document.getElementById('editor-visual').addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            document.execCommand('insertLineBreak', false, null);
        }
    });

    salvarNoNavegador();
    inicializarAutenticacao(); // Controla a entrada verificando senhas

    // Código para registrar o Service Worker do PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA ativo com sucesso!', reg))
                .catch(err => console.log('Erro ao ativar PWA', err));
        });
    }
    </script>
</body>
</html>
